name: Docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'apps/desktop/resources/agent-personas/**'
      - 'scripts/export-agents.ts'
      - 'scripts/generate-agent-reference.ts'
      - 'package.json'
      - 'bun.lock'
      - '.github/workflows/docs.yml'
  pull_request:
    paths:
      - 'docs/**'
      - 'apps/desktop/resources/agent-personas/**'
      - 'scripts/export-agents.ts'
      - 'scripts/generate-agent-reference.ts'
      - 'package.json'
      - 'bun.lock'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run agents:validate
      - run: bun run docs:agents:generate
      - name: Build VitePress
        run: bun run docs:build
      - uses: actions/upload-pages-artifact@v3
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        with:
          path: docs/.vitepress/dist

  deploy:
    name: Deploy to Pages
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
