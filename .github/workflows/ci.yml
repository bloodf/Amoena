name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ts-typecheck:
    name: TypeScript Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - name: Typecheck all packages
        run: bun run type-check

  vitest:
    name: Vitest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - name: Run desktop unit tests
        run: bun run --cwd apps/desktop test
      - name: Run UI package tests
        run: bun run --cwd packages/ui test

  eslint:
    name: ESLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - name: Run ESLint
        run: bun run lint

  prettier:
    name: Prettier
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - name: Check formatting
        run: bun run format:check

  playwright:
    name: Playwright E2E
    runs-on: ubuntu-latest
    needs: [ts-typecheck, vitest]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - name: Install Playwright
        run: bunx playwright install --with-deps chromium
      - name: Build dashboard
        run: bun run --cwd apps/dashboard build
      - name: Run E2E tests (local mode)
        run: bun run --cwd apps/dashboard test:e2e:amoena:local
      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/dashboard/playwright-report/
          retention-days: 7

  cli-build:
    name: CLI Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - name: Build CLI
        run: bash scripts/build-tui.sh
      - name: Verify CLI runs
        run: node apps/tui/bin/amoena.js --version
