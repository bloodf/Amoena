name: Lint

on:
  pull_request:
    branches: [main]

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  eslint:
    name: ESLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - name: Run ESLint
        run: bunx eslint 'packages/*/src/**/*.{ts,tsx}' 'apps/desktop/src/**/*.{ts,tsx}' --max-warnings 0
