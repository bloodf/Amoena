name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v1.0.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install

      - name: ESLint
        run: bun run lint

      - name: Desktop unit tests
        run: bun run --cwd apps/desktop test

      - name: Service tests
        run: bun run --cwd packages/lunaria-service test

      - name: Mobile tests
        run: bun run --cwd apps/mobile test

      - name: Dashboard unit tests
        run: bun run --cwd apps/dashboard test

      - name: UI package tests
        run: bun run --cwd packages/ui test

      - name: Docs build
        run: bun run docs:build

  build-desktop:
    name: Build Desktop (${{ matrix.target }})
    needs: lint-and-test
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            arch: arm64
          - platform: macos-latest
            target: x86_64-apple-darwin
            arch: x64
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            arch: x64
          - platform: ubuntu-22.04
            target: aarch64-unknown-linux-gnu
            arch: arm64
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            arch: x64

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
      - run: bun install

      - name: Install Linux system dependencies
        if: contains(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev

      - name: Import macOS code-signing certificate
        if: contains(matrix.platform, 'macos')
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          if [ -n "$APPLE_CERTIFICATE" ]; then
            echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
            security create-keychain -p actions build.keychain
            security default-keychain -s build.keychain
            security unlock-keychain -p actions build.keychain
            security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
            security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k actions build.keychain
            rm certificate.p12
          fi

      - name: Build Electron app
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bun run --cwd apps/desktop electron:build

      - name: Upload desktop artifact
        uses: actions/upload-artifact@v4
        with:
          name: amoena-desktop-${{ matrix.arch }}-${{ matrix.platform }}
          path: apps/desktop/release/
          retention-days: 7

  build-cli:
    name: Build CLI
    needs: lint-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install

      - name: Build TUI/CLI
        run: bash scripts/build-tui.sh

      - name: Smoke test CLI
        run: |
          chmod +x apps/tui/bin/amoena.js
          node apps/tui/bin/amoena.js --version

      - name: Pack for npm
        working-directory: apps/tui
        run: bun pack

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: amoena-cli
          path: apps/tui/*.tgz

  publish-cli:
    name: Publish CLI to npm
    needs: build-cli
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install

      - name: Build CLI
        run: bash scripts/build-tui.sh

      - name: Publish to npm
        working-directory: apps/tui
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > .npmrc
          npm publish --access public
